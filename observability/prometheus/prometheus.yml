global:
  scrape_interval: 15s

rule_files:
  - release-0.2-alerts.yml

scrape_configs:
  - job_name: ledgerops-core
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
  - job_name: provider-simulator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

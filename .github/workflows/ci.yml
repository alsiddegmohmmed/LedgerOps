name: LedgerOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ledgerops-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verification:
    name: Gradle verification
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run complete test suite
        run: ./gradlew clean test --console=plain --stacktrace

      - name: Run project checks
        run: ./gradlew check --console=plain --stacktrace
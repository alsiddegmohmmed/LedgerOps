spring.application.name=LedgerOps
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level application=${spring.application.name} correlationId=%X{correlationId:-none} logger=%logger{36} %msg%n
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.ack-mode=manual_immediate
ledgerops.messaging.publisher.enabled=false
ledgerops.provider.command-consumer.enabled=false
ledgerops.provider.execution.enabled=false
ledgerops.payment.result-consumer.enabled=false
ledgerops.provider.webhook.enabled=false
ledgerops.provider.webhook.processing.enabled=false

spring.application.name=LedgerOps
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level application=${spring.application.name} correlationId=%X{correlationId:-none} logger=%logger{36} %msg%n
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.observation-enabled=true
spring.kafka.template.observation-enabled=true
management.endpoints.web.exposure.include=health,prometheus
management.prometheus.metrics.export.enabled=true
management.otlp.metrics.export.enabled=false
management.tracing.export.otlp.enabled=${OTLP_TRACING_ENABLED:false}
management.tracing.sampling.probability=1.0
ledgerops.observability.kafka-lag.enabled=true
ledgerops.messaging.publisher.enabled=true
ledgerops.provider.command-consumer.enabled=true
ledgerops.provider.execution.enabled=true
ledgerops.payment.result-consumer.enabled=true
ledgerops.provider.webhook.enabled=true
ledgerops.provider.webhook.processing.enabled=true
ledgerops.provider.webhook.key-id=${PROVIDER_SIMULATOR_WEBHOOK_KEY_ID}
ledgerops.provider.webhook.secret=${PROVIDER_SIMULATOR_WEBHOOK_SECRET}
ledgerops.provider.webhook.provider-client-id=${PROVIDER_SIMULATOR_CLIENT_ID:ledgerops-core}
ledgerops.provider.simulator.base-url=${PROVIDER_SIMULATOR_BASE_URL:http://localhost:8081}
ledgerops.provider.simulator.key-id=${PROVIDER_SIMULATOR_CORE_KEY_ID}
ledgerops.provider.simulator.secret=${PROVIDER_SIMULATOR_CORE_SECRET}

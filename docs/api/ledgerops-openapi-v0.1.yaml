openapi: 3.1.0
info:
  title: LedgerOps Transactional Core API
  version: 0.1.0
  description: >-
    Release 0.1 tenant lifecycle and Payment creation sandbox contract. Payment
    API idempotency is tenant-wide on tenantId plus idempotencyKey. Release 0.1
    intentionally runs without authentication for local demonstration only; do
    not expose it to an untrusted network. Authentication, tenant membership,
    role authorization, and the designated initial Merchant Admin arrive in
    Release 0.3 and are not represented as complete by this contract. Every
    response includes X-Correlation-Id. Error responses use RFC 7807 problem
    details and state the effect, retry policy, and next action.
servers:
  - url: http://localhost:8080
security: []
paths:
  /api/v1/tenants:
    post:
      operationId: createTenant
      summary: Create a pending tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant created
          headers:
            Location:
              schema:
                type: string
                format: uri
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/tenants/{tenantId}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    get:
      operationId: getTenant
      summary: Read tenant history, including suspended tenants
      responses:
        '200':
          description: Tenant found
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/tenants/{tenantId}/activate:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    post:
      operationId: activateTenant
      summary: Activate or reactivate a tenant
      responses:
        '200':
          $ref: '#/components/responses/TenantResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/tenants/{tenantId}/suspend:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    post:
      operationId: suspendTenant
      summary: Suspend an active tenant
      responses:
        '200':
          $ref: '#/components/responses/TenantResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/tenants/{tenantId}/archive:
    parameters:
      - $ref: '#/components/parameters/TenantId'
    post:
      operationId: archiveTenant
      summary: Archive a tenant
      responses:
        '200':
          $ref: '#/components/responses/TenantResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/payments:
    post:
      operationId: createPayment
      summary: Create or replay a Payment request
      description: >-
        The idempotency namespace is tenant-wide. An equivalent request with the
        same tenantId and idempotencyKey returns the original Payment. Reusing
        the pair with materially different content, including another
        merchantId, returns an explicit conflict.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
            examples:
              release01Payment:
                summary: Synthetic SAR Payment
                value:
                  tenantId: 10000000-0000-0000-0000-000000000001
                  merchantId: 20000000-0000-0000-0000-000000000001
                  customerId: 30000000-0000-0000-0000-000000000001
                  amount: 125.00
                  currency: SAR
                  paymentMethodCategory: card
                  idempotencyKey: demo-payment-001
      responses:
        '201':
          description: Payment created in CREATED state
          headers:
            Location:
              schema:
                type: string
                format: uri
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
              examples:
                createdPayment:
                  $ref: '#/components/examples/CreatedPayment'
        '200':
          description: Equivalent request replayed with the original logical result
          headers:
            Location:
              schema:
                type: string
                format: uri
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
              examples:
                replayedPayment:
                  $ref: '#/components/examples/CreatedPayment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/PaymentConflict'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  headers:
    CorrelationId:
      description: Identifier used to correlate the response with logs and support evidence.
      schema:
        type: string
        format: uuid
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateTenantRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - defaultCurrency
        - defaultLocale
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        defaultCurrency:
          type: string
          pattern: '^[A-Z]{3}$'
          examples:
            - SAR
        defaultLocale:
          type: string
          maxLength: 35
          examples:
            - en-SA
    Tenant:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - defaultCurrency
        - defaultLocale
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        defaultCurrency:
          type: string
        defaultLocale:
          type: string
        status:
          type: string
          enum:
            - PENDING_ACTIVATION
            - ACTIVE
            - SUSPENDED
            - ARCHIVED
    CreatePaymentRequest:
      type: object
      additionalProperties: false
      required:
        - tenantId
        - merchantId
        - customerId
        - amount
        - currency
        - paymentMethodCategory
        - idempotencyKey
      properties:
        tenantId:
          type: string
          format: uuid
        merchantId:
          type: string
          format: uuid
          description: >-
            Material request content. merchantId is not part of the uniqueness
            boundary.
        customerId:
          type: string
          format: uuid
        amount:
          type: number
          exclusiveMinimum: 0
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          examples:
            - SAR
        paymentMethodCategory:
          type: string
          minLength: 1
          examples:
            - card
        idempotencyKey:
          type: string
          minLength: 1
          description: Unique across the tenant Payment API namespace.
          examples:
            - checkout-2026-0001
    Payment:
      type: object
      additionalProperties: false
      required:
        - id
        - tenantId
        - merchantId
        - customerId
        - amount
        - currency
        - paymentMethodCategory
        - status
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        merchantId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        amount:
          type: number
        currency:
          type: string
        paymentMethodCategory:
          type: string
        status:
          type: string
          enum:
            - CREATED
            - VALIDATING
            - RISK_REVIEW
            - APPROVED
            - REJECTED
            - PROCESSING
            - COMPLETED
            - FAILED
            - REVERSED
    Problem:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - correlationId
        - effect
        - retryable
        - nextAction
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
        correlationId:
          type: string
          format: uuid
        effect:
          type: string
          description: What the failed operation changed, or confirmation that it changed nothing.
        retryable:
          type: boolean
          description: Whether LedgerOps will retry the operation automatically.
        nextAction:
          type: string
          description: The next action permitted for the API client or operator.
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        targetStatus:
          type: string
        referenceType:
          type: string
          enum:
            - TENANT
            - MERCHANT
            - CUSTOMER
        reason:
          type: string
          enum:
            - INACTIVE
            - NOT_FOUND
        errors:
          type: object
          additionalProperties:
            type: string
  responses:
    TenantResult:
      description: Tenant lifecycle transition completed
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Tenant'
    BadRequest:
      description: Request validation failed
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Tenant does not exist
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Tenant name or lifecycle conflict
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            tenantNameConflict:
              value:
                type: urn:ledgerops:problem:tenant-name-conflict
                title: Tenant name conflict
                status: 409
                detail: 'Tenant name already exists: Acme Payments'
                code: TENANT_NAME_CONFLICT
                correlationId: 8a1cb024-e768-4c23-949e-2725cfc22a25
                effect: No tenant was created.
                retryable: false
                nextAction: Choose another tenant name or read the existing tenant.
                tenantName: Acme Payments
    PaymentConflict:
      description: >-
        The tenant idempotency key has different request content, or a required
        tenant, merchant, or customer reference cannot accept new activity.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            idempotencyConflict:
              value:
                type: urn:ledgerops:problem:payment-idempotency-conflict
                title: Payment idempotency conflict
                status: 409
                detail: >-
                  An existing payment uses this tenant idempotency key with
                  different request content
                code: PAYMENT_IDEMPOTENCY_CONFLICT
                correlationId: 8a1cb024-e768-4c23-949e-2725cfc22a25
                effect: The existing Payment was unchanged and no new Payment was created.
                retryable: false
                nextAction: Reuse the original request content or choose a new idempotency key.
                tenantId: 9d492ac1-cf66-41cc-a82d-96f8a6d22e93
    InternalError:
      description: An unexpected error was handled without exposing internal details
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            unexpectedFailure:
              value:
                type: urn:ledgerops:problem:unexpected-internal-error
                title: Unexpected internal error
                status: 500
                detail: The request could not be completed safely
                code: UNEXPECTED_INTERNAL_ERROR
                correlationId: 8a1cb024-e768-4c23-949e-2725cfc22a25
                effect: The final effect could not be confirmed from this response.
                retryable: false
                nextAction: Verify the resource state, then contact support with the correlationId.
  examples:
    CreatedPayment:
      value:
        id: 40000000-0000-0000-0000-000000000001
        tenantId: 10000000-0000-0000-0000-000000000001
        merchantId: 20000000-0000-0000-0000-000000000001
        customerId: 30000000-0000-0000-0000-000000000001
        amount: 125.00
        currency: SAR
        paymentMethodCategory: card
        status: CREATED

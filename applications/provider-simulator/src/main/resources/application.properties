spring.application.name=LedgerOpsProviderSimulator
spring.datasource.url=${SIMULATOR_DATABASE_URL:jdbc:postgresql://localhost:5433/provider_simulator}
spring.datasource.username=${SIMULATOR_DATABASE_USERNAME:provider_simulator}
spring.datasource.password=${SIMULATOR_DATABASE_PASSWORD}
spring.jpa.open-in-view=false
ledgerops.simulator.core-key-id=${SIMULATOR_CORE_KEY_ID}
ledgerops.simulator.core-secret=${SIMULATOR_CORE_SECRET}
ledgerops.simulator.provider-client-id=${SIMULATOR_PROVIDER_CLIENT_ID:ledgerops-core}
